<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Codework Desktop</title>
		<style>
			:root {
				color-scheme: light;
				font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
				background: linear-gradient(135deg, #f4f1ea 0%, #dce8f5 100%);
				color: #14213d;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
			}

			main {
				padding: 48px;
				border-radius: 24px;
				background: rgba(255, 255, 255, 0.8);
				box-shadow: 0 24px 64px rgba(20, 33, 61, 0.16);
				text-align: center;
			}

			h1 {
				margin: 0 0 12px;
				font-size: 3rem;
			}

			p {
				margin: 0;
				font-size: 1.125rem;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Hello World</h1>
			<p>Electron desktop app scaffold for Codework.</p>
		</main>
	</body>
</html>
