<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
	<meta name="theme-color" content="#161616" />
	<link rel="icon" href="/cwlogo.png" type="image/svg+xml" sizes="any" />
	<link rel="apple-touch-icon" href="/cwlogo.png" />
	<script src="/shell.js"></script>
	<title>CodeWork</title>
	<style>
		html,
		body,
		#root {
			width: 100%;
			height: 100%;
			margin: 0;
		}

		body {
			background: #ffffff;
			color: #262626;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}

		html.dark body {
			background: #161616;
			color: #f5f5f5;
		}

		#boot-shell {
			display: flex;
			align-items: center;
			justify-content: center;
			position: fixed;
			inset: 0;
			z-index: 9999;
			background: inherit;
			opacity: 1;
			transition: opacity 200ms ease;
		}

		#boot-shell-card {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 96px;
			height: 96px;
		}

		#boot-shell-logo {
			width: 64px;
			height: 64px;
			object-fit: contain;
		}

		#boot-shell.is-leaving {
			opacity: 0;
			pointer-events: none;
		}

		@media (prefers-reduced-motion: reduce) {
			#boot-shell {
				transition-duration: 1ms;
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>
	<div id="boot-shell">
		<div id="boot-shell-card" aria-label="CodeWork">
			<img id="boot-shell-logo" src="/cwlogo.png" alt="CodeWork" />
		</div>
	</div>
	<script type="module" src="/src/main.tsx"></script>
</body>

</html>
