<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#161616" />
		<link rel="icon" href="/icon.png" type="image/svg+xml" sizes="any" />
		<link rel="apple-touch-icon" href="/icon.png" />
		<script src="/shell.js"></script>
		<title>CodeWork</title>
		<style>
			html,
			body,
			#root {
				width: 100%;
				height: 100%;
				margin: 0;
			}

			body {
				background: #ffffff;
				color: #262626;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			}

			html.dark body {
				background: #161616;
				color: #f5f5f5;
			}

			#boot-shell {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100%;
				background: inherit;
			}

			#boot-shell-card {
				display: flex;
				align-items: center;
				justify-content: center;
				width: 96px;
				height: 96px;
			}

			#boot-shell-logo {
				width: 64px;
				height: 64px;
				object-fit: contain;
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div id="boot-shell">
				<div id="boot-shell-card" aria-label="CodeWork splash screen">
					<img id="boot-shell-logo" src="/icon.png" alt="CodeWork" />
				</div>
			</div>
		</div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
